+# CI Helper — Node + Grunt (Jest and Mocha examples)
+
+This file contains recommended `package.json` snippets and quick run instructions for the **unified CI** added to `.github/workflows/nodejs-grunt-ci-complete.yml`.
+
+> **Important**: These snippets are examples. Merge the parts that match your project's test stack (Jest vs Mocha). Do **not** store secrets in the repository.
+
+---
+
+## Jest (recommended modern stack)
+
+Add or merge the following into your `package.json` (scripts & devDependencies).
+
+```json
+{
+  "scripts": {
+    "test": "jest --runInBand",
+    "test:ci": "jest --runInBand --coverage --coverageDirectory=coverage --reporters=default --reporters=jest-junit",
+    "lint": "eslint . --ext .js,.ts || true",
+    "format": "prettier --check ."
+  },
+  "jest": {
+    "collectCoverage": true,
+    "coverageDirectory": "./coverage",
+    "collectCoverageFrom": ["src/**/*.{js,ts,tsx}"],
+    "reporters": [
+      "default",
+      ["jest-junit", { "outputDirectory": "./test-results", "outputName": "junit.xml" }]
+    ]
+  },
+  "devDependencies": {
+    "jest": "^29.0.0",
+    "jest-junit": "^13.0.0",
+    "eslint": "^8.0.0",
+    "prettier": "^3.0.0"
+  }
+}
+```
+
+**Local run**
+```bash
+npm ci
+npm run test:ci   # generates coverage/ and test-results/junit.xml
+```
+
+---
+
+## Mocha + NYC (alternative)
+
+If your project uses Mocha, use this snippet:
+
+```json
+{
+  "scripts": {
+    "test": "mocha --reporter spec",
+    "test:ci": "nyc --reporter=lcov --reporter=text mocha --reporter mocha-junit-reporter --reporter-options mochaFile=./test-results/junit.xml",
+    "lint": "eslint . --ext .js,.ts || true",
+    "format": "prettier --check ."
+  },
+  "devDependencies": {
+    "mocha": "^10.0.0",
+    "nyc": "^15.0.0",
+    "mocha-junit-reporter": "^2.0.0",
+    "eslint": "^8.0.0",
+    "prettier": "^3.0.0"
+  },
+  "nyc": {
+    "all": true,
+    "reporter": ["lcov", "text"],
+    "report-dir": "./coverage",
+    "include": ["src/**/*.js"]
+  }
+}
+```
+
+**Local run**
+```bash
+npm ci
+npm run test:ci   # generates coverage/ and test-results/junit.xml
+```
+
+---
+
+## Notes & tips
+
+- **Grunt**: If your repo assumes a global `grunt` CLI, add `grunt` and `grunt-cli` as `devDependencies` to ensure `npx grunt` works in CI:
+  ```bash
+  npm i -D grunt grunt-cli
+  ```
+
+- **SBOM**: The workflow uses `anchore/syft-action` to generate a CycloneDX SBOM at `sbom/cyclonedx.xml`. The SBOM is uploaded as an artifact.
+
+- **Audit**: The CI runs `npm audit` and fails the job if **high** or **critical** vulnerabilities are present. Adjust the script if you want different thresholds.
+
+- **JUnit**: The test runner must produce `test-results/junit.xml` for the test reporter to display results in the GitHub Actions UI. Both Jest and Mocha snippets above create this file.
+
+- **Artifacts**: On failure the workflow uploads `audit.json`, `test-results/junit.xml`, `coverage/lcov.info`, and `sbom/cyclonedx.xml` to the run artifacts.
+
+---
+
+## Quick acceptance checklist
+
+1. Create or merge `test:ci` into your `package.json` (Jest or Mocha variant).
+2. Ensure `package-lock.json` is committed so Actions caching works.
+3. Apply this patch, push to a branch, and open a PR to `main`.
+4. On PR the workflow should run across Node 18/20/22. Verify:
+   - `sbom/cyclonedx.xml` artifact present,
+   - coverage artifact present (if `test:ci` configured),
+   - `test-results/junit.xml` published in the Actions UI,
+   - job fails if high/critical `npm audit` issues exist.
+
+If you want, I can now:
+- produce a single `git format-patch`-style file instead of this unified patch, or
+- automatically inject the Jest or Mocha snippet into your `package.json` (I will print the exact merged JSON to paste).
+
+Say `APPLY_PATCH` when you have applied the patch and want the next step (e.g., update package.json with Jest or Mocha), or say `EMIT_PATCH_FILE` if you want the raw patch file output for download.
+
