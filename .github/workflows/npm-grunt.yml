diff --git a/.github/workflows/nodejs-grunt-ci-complete.yml b/.github/workflows/nodejs-grunt-ci-complete.yml
new file mode 100644
index 0000000..1111111
--- /dev/null
+++ b/.github/workflows/nodejs-grunt-ci-complete.yml
@@ -0,0 +1,235 @@
+name: NodeJS + Grunt — CI (coverage, junit, SBOM, audit)
+
+on:
+  push:
+    branches: [ "main" ]
+  pull_request:
+    branches: [ "main" ]
+
+concurrency:
+  group: ${{ github.workflow }}-${{ github.ref }}
+  cancel-in-progress: true
+
+permissions:
+  contents: read
+  actions: read
+
+jobs:
+  build:
+    name: build (node ${{ matrix.node-version }})
+    runs-on: ubuntu-latest
+    strategy:
+      fail-fast: false
+      matrix:
+        node-version: [18.x, 20.x, 22.x]
+
+    steps:
+      - name: Checkout
+        uses: actions/checkout@v4
+        with:
+          fetch-depth: 0
+
+      - name: Use Node.js ${{ matrix.node-version }}
+        uses: actions/setup-node@v4
+        with:
+          node-version: ${{ matrix.node-version }}
+          cache: "npm"
+          cache-dependency-path: package-lock.json
+
+      - name: Show versions
+        run: |
+          node --version
+          npm --version
+          npx --version
+
+      - name: Install dependencies (npm ci)
+        run: npm ci
+
+      - name: Generate SBOM (Syft -> CycloneDX)
+        uses: anchore/syft-action@v0.11.1
+        with:
+          output-format: "cyclonedx-1.4"
+          output-path: "sbom/cyclonedx.xml"
+
+      - name: Detect npm scripts (lint/test/format)
+        id: detect-scripts
+        run: |
+          node -e "
+const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8'));
+console.log('has_lint='+(p.scripts&&p.scripts.lint?1:0));
+console.log('has_test='+(p.scripts&&p.scripts.test?1:0));
+console.log('has_testci='+(p.scripts&&p.scripts['test:ci']?1:0));
+console.log('has_format='+(p.scripts&& (p.scripts.format||p.scripts['format:check']) ?1:0));
+"
+ | sed -n '1,4p' > /tmp/detect.out
+          echo "::set-output name=has_lint::$(grep -o 'has_lint=.' /tmp/detect.out | awk -F= '{print $2}')"
+          echo "::set-output name=has_test::$(grep -o 'has_test=.' /tmp/detect.out | awk -F= '{print $2}')"
+          echo "::set-output name=has_testci::$(grep -o 'has_testci=.' /tmp/detect.out | awk -F= '{print $2}')"
+          echo "::set-output name=has_format::$(grep -o 'has_format=.' /tmp/detect.out | awk -F= '{print $2}')"
+
+      - name: Lint (if configured)
+        if: steps.detect-scripts.outputs.has_lint == '1'
+        run: npm run lint
+
+      - name: Format check (if configured)
+        if: steps.detect-scripts.outputs.has_format == '1'
+        run: |
+          # CI should run a check-only format command (prettier --check)
+          npm run format || { echo "Format check failed"; exit 1; }
+
+      - name: Run tests + coverage (if configured)
+        if: steps.detect-scripts.outputs.has_testci == '1'
+        run: |
+          # test:ci should run tests and output coverage into ./coverage and junit into ./test-results
+          npm run test:ci
+
+      - name: Run tests (fallback: npm test)
+        if: steps.detect-scripts.outputs.has_testci != '1' && steps.detect-scripts.outputs.has_test == '1'
+        run: |
+          npm test --if-present
+
+      - name: Publish JUnit test results to GH checks
+        if: always() && (steps.detect-scripts.outputs.has_test == '1' || steps.detect-scripts.outputs.has_testci == '1')
+        uses: dorny/test-reporter@v1
+        with:
+          name: unit-tests
+          path: test-results/junit.xml
+          reporter: junit
+          fail-on-error: false
+
+      - name: Upload coverage artifact
+        if: always() && steps.detect-scripts.outputs.has_testci == '1'
+        uses: actions/upload-artifact@v4
+        with:
+          name: coverage-${{ matrix.node-version }}-${{ github.run_number }}
+          path: |
+            coverage
+            coverage/lcov.info
+
+      - name: Audit (fail on high/critical)
+        run: |
+          npm audit --json > audit.json || true
+          node -e '
+const fs = require("fs");
+try {
+  const data = JSON.parse(fs.readFileSync("audit.json","utf8") || "{}");
+  if (!data.metadata) { console.log("npm audit returned no metadata"); process.exit(0); }
+  const vulns = data.metadata.vulnerabilities || {};
+  const high = vulns.high || 0;
+  const critical = vulns.critical || 0;
+  console.log("Vulnerabilities:", JSON.stringify(vulns));
+  if (high > 0 || critical > 0) {
+    console.error("High/critical vulnerabilities detected. high=", high, "critical=", critical);
+    process.exit(2);
+  }
+} catch(e) { console.warn("audit parse error", e.message); }
+'
+
+      - name: Build with Grunt
+        run: npx grunt --no-color
+
+      - name: Upload SBOM artifact
+        if: always()
+        uses: actions/upload-artifact@v4
+        with:
+          name: sbom-${{ github.sha }}
+          path: sbom/cyclonedx.xml
+
+      - name: Upload diagnostics on failure
+        if: failure()
+        uses: actions/upload-artifact@v4
+        with:
+          name: ci-failure-${{ matrix.node-version }}-${{ github.run_number }}
+          path: |
+            audit.json
+            test-results/junit.xml
+            coverage/lcov.info
+            sbom/cyclonedx.xml
+
+      - name: Success message
+        if: success()
+        run: echo "CI passed for node ${{ matrix.node-version }}"
+
